<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Movie</title>

<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
>

<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
>

<style>

    body{
        background:#f4f6f9;
        font-family:Arial, sans-serif;
    }

    .movie-card{
        max-width:700px;
        margin:50px auto;
        border:none;
        border-radius:20px;
        overflow:hidden;
        box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }

    .card-header{
        background:#0d6efd;
        color:white;
        padding:25px;
        text-align:center;
    }

    .card-body{
        padding:35px;
        background:white;
    }

    .form-control{
        border-radius:10px;
        padding:12px;
    }

    textarea{
        resize:none;
    }

    .btn-update{
        width:100%;
        border-radius:10px;
        padding:12px;
        font-size:16px;
        font-weight:bold;
    }

    .preview-img{
        width:200px;
        border-radius:10px;
        margin-top:10px;
        border:1px solid #ddd;
    }

    .top-bar{
        max-width:700px;
        margin:20px auto;
        display:flex;
        justify-content:flex-end;
    }

    .back-btn{
        text-decoration:none;
        background:#0d6efd;
        color:white;
        padding:10px 20px;
        border-radius:8px;
        font-weight:bold;
    }

    .back-btn:hover{
        background:#0b5ed7;
        color:white;
    }

    .video-name{
        margin-top:10px;
        color:#666;
        font-size:14px;
    }

</style>

</head>
<body>

<div class="container">

    <div class="top-bar">

        <a href="{% url 'movielist' %}" class="back-btn">
            <i class="bi bi-arrow-left"></i>
            Back
        </a>

    </div>

    <div class="card movie-card">

        <div class="card-header">

            <h2>
                <i class="bi bi-pencil-square"></i>
                Edit Movie
            </h2>

        </div>

        <div class="card-body">

            {% if messages %}
                {% for message in messages %}
                    <div class="alert
                        {% if message.tags == 'success' %}
                            alert-success
                        {% else %}
                            alert-danger
                        {% endif %}
                        alert-dismissible fade show">

                        {{ message }}

                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="alert">
                        </button>

                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST"
                enctype="multipart/form-data">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Movie Name
                    </label>

                    <input
                        type="text"
                        name="movie_name"
                        class="form-control"
                        value="{{ movie.name }}"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Description
                    </label>

                    <textarea
                        name="description"
                        rows="4"
                        class="form-control"
                        required>{{ movie.description }}</textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Current Thumbnail
                    </label>

                    <br>

                    <img
                        src="{{ movie.thumbnail.url }}"
                        class="preview-img"
                        alt="Thumbnail"
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Change Thumbnail
                    </label>

                    <input
                        type="file"
                        name="thumbnail"
                        class="form-control"
                        accept="image/*"
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Current Video
                    </label>

                    <div class="video-name">
                        {{ movie.video.name }}
                    </div>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Replace Video
                    </label>

                    <input
                        type="file"
                        name="video"
                        class="form-control"
                        accept="video/*"
                    >

                </div>

                <button
                    type="submit"
                    class="btn btn-danger btn-update">

                    <i class="bi bi-check-circle"></i>
                    Update Movie

                </button>

            </form>

        </div>

    </div>

</div>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
