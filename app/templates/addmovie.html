<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Movie</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link 
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial, sans-serif;
        }

        .movie-card{
            max-width:700px;
            margin:50px auto;
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .card-header{
            background:#0d6efd;
            color:white;
            padding:25px;
            text-align:center;
        }

        .card-body{
            padding:35px;
            background:white;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        textarea{
            resize:none;
        }

        .btn-upload{
            width:100%;
            border-radius:10px;
            padding:12px;
            font-size:16px;
            font-weight:bold;
        }

    </style>

</head>
<body>

    <div class="container">

        <div class="card movie-card">

            <!-- HEADER -->
            <div class="card-header">

                <h2>
                    <i class="bi bi-film"></i>
                    Add Movie
                </h2>

            </div>

            <!-- BODY -->
            <div class="card-body">

                <!-- POPUP MESSAGES -->
                {% if messages %}
                    {% for message in messages %}

                        <div class="alert 
                            {% if message.tags == 'success' %}
                                alert-success
                            {% else %}
                                alert-danger
                            {% endif %}
                            alert-dismissible fade show"
                            role="alert">

                            {{ message }}

                            <button 
                                type="button"
                                class="btn-close"
                                data-bs-dismiss="alert">
                            </button>

                        </div>

                    {% endfor %}
                {% endif %}

                <!-- FORM -->
                <form method="POST" enctype="multipart/form-data" action="{% url 'addmovie'%}">

                    {% csrf_token %}

                    <!-- MOVIE NAME -->
                    <div class="mb-3">

                        <label class="form-label">
                            Movie Name
                        </label>

                        <input
                            type="text"
                            name="movie_name"
                            class="form-control"
                            placeholder="Enter movie name"
                            required
                        >

                    </div>

                    <!-- DESCRIPTION -->
                    <div class="mb-3">

                        <label class="form-label">
                            Description
                        </label>

                        <textarea
                            name="description"
                            rows="4"
                            class="form-control"
                            placeholder="Enter movie description"
                            required>
                        </textarea>

                    </div>

                    <!-- RELEASE YEAR -->
                    <div class="mb-3">

                        <label class="form-label">
                            Release Year
                        </label>

                        <input
                            type="number"
                            name="release_year"
                            class="form-control"
                            placeholder="Enter release year"
                            required
                        >

                    </div>

                    <!-- THUMBNAIL -->
                    <div class="mb-3">

                        <label class="form-label">
                            Movie Thumbnail
                        </label>

                        <input
                            type="file"
                            name="thumbnail"
                            class="form-control"
                            accept="image/*"
                            required
                        >

                    </div>

                    <!-- MOVIE FILE -->
                    <div class="mb-4">

                        <label class="form-label">
                            Movie File
                        </label>

                        <input
                            type="file"
                            name="movie_file"
                            class="form-control"
                            accept="video/*"
                            required
                        >

                    </div>

                    <!-- BUTTON -->
                    <button type="submit" class="btn btn-primary btn-upload">

                        <i class="bi bi-upload"></i>
                        Upload Movie

                    </button>

                </form>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
