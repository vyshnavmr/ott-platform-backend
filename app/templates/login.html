<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Login</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <style>
        body{
            margin:0;
            padding:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            font-family: Arial, sans-serif;
        }

        .login-container{
            width:100%;
            max-width:420px;
            padding:20px;
        }

        .login-card{
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .login-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:30px 20px;
        }

        .login-header h2{
            margin-bottom:5px;
            font-weight:bold;
        }

        .card-body{
            padding:35px;
            background:white;
        }

        .form-control{
            height:50px;
            border-radius:10px;
        }

        .btn-login{
            width:100%;
            height:50px;
            border-radius:10px;
            font-weight:bold;
            font-size:16px;
        }

        .admin-text{
            text-align:center;
            margin-top:15px;
            color:gray;
            font-size:14px;
        }

        @media(max-width:576px){
            .card-body{
                padding:25px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">

        <div class="card login-card">

            <div class="login-header">
                <h2>Admin Login</h2>
                <p class="mb-0">Authorized access only</p>
            </div>

           {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            
            <div class="card-body">

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input 
                            type="text"
                            name="email"
                            class="form-control"
                            placeholder="Enter admin email"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input 
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter password"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary btn-login">
                        Login
                    </button>

                    <div class="admin-text">
                        Admin Panel Access
                    </div>

                </form>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
