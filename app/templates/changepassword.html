<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link 
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        body{
            background:linear-gradient(to right,#141e30,#243b55);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
        }

        .password-card{
            width:100%;
            max-width:450px;
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:25px;
        }

        .card-body{
            padding:35px;
            background:white;
        }

        .form-control{
            height:50px;
            border-radius:10px;
        }

        .back-container{
            position:absolute;
            top:30px;
            right:30px;
        }

        .back-btn{
            text-decoration:none;
            background:#0d6efd;
            color:white;
            padding:10px 20px;
            border-radius:10px;
            font-weight:bold;
        }

        .back-btn:hover{
            background:#0b5ed7;
            color:white;
        }
    </style>
</head>
<body>

    <div class="back-container">
        <a href="{% url 'home' %}" class="back-btn">
            <i class="bi bi-arrow-left"></i>
            Back
        </a>
    </div>
    
    <div class="card password-card">

        <!-- HEADER -->
        <div class="card-header">
            <h3>
                <i class="bi bi-shield-lock-fill"></i>
                Change Password
            </h3>
        </div>

        <!-- BODY -->
        <div class="card-body">

            <!-- SUCCESS / ERROR MESSAGE -->
            {% if messages %}
                {% for message in messages %}

                    <div class="alert 
                        {% if message.tags == 'success' %}
                            alert-success
                        {% else %}
                            alert-danger
                        {% endif %}
                        alert-dismissible fade show"
                        role="alert">

                        {{ message }}

                        <button 
                            type="button" 
                            class="btn-close"
                            data-bs-dismiss="alert">
                        </button>

                    </div>

                {% endfor %}
            {% endif %}

            <!-- FORM -->
            <form method="POST">

                {% csrf_token %}

                <!-- CURRENT PASSWORD -->
                <div class="mb-3">

                    <label class="form-label">
                        Current Password
                    </label>

                    <input
                        type="password"
                        name="current_password"
                        class="form-control"
                        placeholder="Enter current password"
                        required
                    >

                </div>

                <!-- NEW PASSWORD -->
                <div class="mb-3">

                    <label class="form-label">
                        New Password
                    </label>

                    <input
                        type="password"
                        name="new_password"
                        class="form-control"
                        placeholder="Enter new password"
                        required
                    >

                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="mb-4">

                    <label class="form-label">
                        Re-enter Password
                    </label>

                    <input
                        type="password"
                        name="confirm_password"
                        class="form-control"
                        placeholder="Re-enter new password"
                        required
                    >

                </div>

                <!-- BUTTON -->
                <button type="submit" class="btn btn-primary btn-update">
                    Update Password
                </button>

            </form>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
